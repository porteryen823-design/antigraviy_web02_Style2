version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: porter_ai_web
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  nginx:
    image: nginx:alpine
    container_name: porter_ai_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

  ngrok:
    image: ngrok/ngrok:latest
    container_name: porter_ai_ngrok
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - http
      - nginx:80
      - --log=stdout
    ports:
      - "4040:4040"
    depends_on:
      - nginx
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
